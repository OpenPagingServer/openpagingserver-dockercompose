services:
  ops:
    network_mode: bridge
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${SIP_PORT:-5060}:5060/tcp"
      - "${SIP_PORT:-5060}:5060/udp"
      - "8088:8088"
      - "50010:50010"
      - "8710:8710/udp"
    depends_on:
      db:
        condition: service_healthy
    environment:
      - APP_DB_HOST=db

  db-init:
    network_mode: bridge
    environment:
      - APP_DB_HOST=db
      - APP_DB_PORT=3306
      - APP_DB_USER=${DB_USER:-}
      - APP_DB_PASS=${DB_PASS:-}
      - APP_DB_NAME=${DB_NAME:-}
    depends_on:
      db:
        condition: service_healthy
