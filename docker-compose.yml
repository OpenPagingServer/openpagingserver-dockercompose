services:
  ops:
    build: .
    restart: unless-stopped
    network_mode: host
    environment:
      - OPS_DOCKER_MODE=1
      - WEB_REVERSE_PROXY_ALLOWED=${WEB_REVERSE_PROXY_ALLOWED:-}
      - API_REVERSE_PROXY_ALLOWED=${API_REVERSE_PROXY_ALLOWED:-}
      - DEBUG=${DEBUG:-false}
      - DEMO_MODE=${DEMO_MODE:-false}
      - APP_DB_HOST=${DB_HOST:-127.0.0.1}
      - APP_DB_USER=${DB_USER:-}
      - APP_DB_PASS=${DB_PASS:-}
      - APP_DB_NAME=${DB_NAME:-}
    volumes:
      - ops_env:/opt/ops_env
      - ops_assets:/var/lib/openpagingserver/assets

  db-init:
    build: .
    profiles: ["init"]
    environment:
      - OPS_DOCKER_MODE=1
      - APP_DB_HOST=${DB_HOST:-127.0.0.1}
      - APP_DB_PORT=3306
      - APP_DB_USER=${DB_USER:-}
      - APP_DB_PASS=${DB_PASS:-}
      - APP_DB_NAME=${DB_NAME:-}
    network_mode: host
    volumes:
      - ops_env:/opt/ops_env
    command: ["python", "/opt/docker-init-db.py"]

volumes:
  ops_env:
  ops_assets:
